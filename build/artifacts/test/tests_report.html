<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title>Test Overview</title>
<style>
* { font-family: sans-serif;}
table {
border-collapse: collapse;
table-layout: fixed;
width: 99%;
margin: 0 0px 25px 7px;
padding-right: 7px;
font-size: 0.9em;
min-width: 400px;
border-radius: 5px 5px 0 0;
overflow: hidden;
box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
}
details summary { cursor: pointer; }
h1 {
margin: 0 0 7px 14px;
font-size: 1.5em;
font-weight: bold;
text-align: left;
}
thead tr {
background-color: #009879;
color: #ffffff;
text-align: left;
font-weight: bold;
}
.failed thead tr { background-color: #983500; }
.ignored thead tr { background-color: #849800; }
.success thead tr { background-color: #00981e; }
table th, td { padding: 12px 15px; word-break: break-all; }
table tbody tr { border-bottom: 1px solid #dddddd; }
table tbody tr:nth-of-type(even) { background-color: #f3f3f3; }
table tbody tr:last-of-type { border-bottom: 2px solid #009879; }
.failed tbody tr:last-of-type { border-bottom: 2px solid #983500; }
.ignored tbody tr:last-of-type { border-bottom: 2px solid #849800; }
.success tbody tr:last-of-type { border-bottom: 2px solid #00981e; }
table tbody tr:hover { color: #009879; }
.failed tbody tr:hover { color: #983500; }
.ignored tbody tr:hover { color: #849800; }
.success tbody tr:hover { color: #00981e; }
</style>
</head>
<body>

</body>
</html>
